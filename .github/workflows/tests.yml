name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv and install dev deps
        # setup-uv with python-version already provisions .venv; --clear
        # replaces it instead of erroring on the existing one.
        run: |
          uv venv --clear
          uv pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: uv run ruff check .

      # No `ruff format --check` gate: parts of the codebase keep
      # hand-curated formatting (e.g. core/article_db.py) and the repo has
      # never been format-clean. `ruff check` is the enforced gate.

      - name: Tests (pytest)
        run: uv run pytest -q

  macos-gui:
    name: macOS GUI build
    # Needs Xcode 16+: current xcodegen emits project format 77, which
    # Xcode 15.x (macos-14 default) cannot open.
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project and build
        working-directory: gui-macos
        # Scheme name "ScopusForDobby" is taken directly from project.yml
        # (targets.ScopusForDobby / PRODUCT_NAME). CODE_SIGNING_ALLOWED=NO
        # keeps the build unsigned so it runs on the hosted runner.
        run: |
          xcodegen generate
          xcodebuild \
            -project ScopusForDobby.xcodeproj \
            -scheme ScopusForDobby \
            -destination 'platform=macOS' \
            build CODE_SIGNING_ALLOWED=NO
