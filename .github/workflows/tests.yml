name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create venv and install dev deps
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Tests (pytest)
        run: uv run pytest -q

  macos-gui:
    name: macOS GUI build
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project and build
        working-directory: gui-macos
        # Scheme name "ScopusForDobby" is taken directly from project.yml
        # (targets.ScopusForDobby / PRODUCT_NAME). CODE_SIGNING_ALLOWED=NO
        # keeps the build unsigned so it runs on the hosted runner.
        run: |
          xcodegen generate
          xcodebuild \
            -project ScopusForDobby.xcodeproj \
            -scheme ScopusForDobby \
            -destination 'platform=macOS' \
            build CODE_SIGNING_ALLOWED=NO
